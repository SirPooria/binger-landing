# Ephemeral Postgres + Redis for API integration tests.
# Published on non-default host ports so they don't clash with the dev stack.
#   docker compose -f infra/docker-compose.test.yml up -d
#   (then run `npm test` in apps/api with the matching env — see apps/api/test/setup.ts)
name: binger-test

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: binger_test
      POSTGRES_USER: binger_test
      POSTGRES_PASSWORD: binger_test
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binger_test -d binger_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
