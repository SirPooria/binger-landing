# Binger full stack. Run from repo root:
#   docker compose -f infra/docker-compose.yml --env-file .env up --build
#
# Services: postgres, redis, api (BFF), expo-web, nginx (reverse proxy).
name: binger

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-binger}
      POSTGRES_USER: ${POSTGRES_USER:-binger_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
    volumes:
      - binger_pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Internal only — not exposed to the host.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-binger_user} -d ${POSTGRES_DB:-binger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [binger_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - binger_redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [binger_net]

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3001
      TMDB_API_KEY: ${TMDB_API_KEY}
      REDIS_URL: redis://redis:6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-binger}
      POSTGRES_USER: ${POSTGRES_USER:-binger_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-3-5-sonnet-latest}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [binger_net]

  expo-web:
    build:
      context: ../apps/mobile
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:8080}
      EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY}
    expose:
      - "8081"
    networks: [binger_net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      # - "443:443"  # enable when SSL certs are mounted
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro   # Let's Encrypt certs
    depends_on:
      - api
      - expo-web
    networks: [binger_net]

volumes:
  binger_pgdata:
  binger_redis_data:

networks:
  binger_net:
    driver: bridge
